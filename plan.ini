plan.md
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Buddy - אפיון פרויקט</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0d9488',
                        secondary: '#0f766e',
                        accent: '#f59e0b',
                        background: '#f8fafc',
                        surface: '#ffffff'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto; height: 300px; max-height: 400px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="text-slate-800 leading-relaxed">

    <!-- Chosen Palette: Teal & Slate (Professional) -->
    <!-- Application Structure Plan: האפליקציה בנויה כדשבורד אינטראקטיבי עם ניווט לשוניות (Tabs). מבנה זה נבחר כדי לאפשר למשתמש לעבור בין המבט הכללי, הארכיטקטורה הטכנית, ערימת הטכנולוגיות ומבנה בסיס הנתונים בצורה לא ליניארית, מה שמקל על הבנת הקשרים בין חלקי המערכת. -->
    <!-- Visualization & Content Choices: 
         1. השוואת ביצועים: גרף עמודות (Chart.js) להשוואת הארכיטקטורה הישנה מול החדשה.
         2. תזרים נתונים: מבנה כרטיסים אינטראקטיביים להצגת הארכיטקטורה.
         3. סכימת DB: טבלה מעוצבת עם JavaScript לסינון/הצגת פרטי עמודות.
         4. אבטחה: רשימת תיוג אינטראקטיבית.
         CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <div class="min-h-screen flex flex-col">
        <header class="bg-secondary text-white shadow-lg p-6">
            <div class="container mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold">Broadcast Buddy</h1>
                    <p class="opacity-90">אפיון מערכת שידור וואטסאפ חכמה</p>
                </div>
                <div class="hidden md:block">
                    <span class="bg-white/20 px-4 py-2 rounded-full text-sm">Next.js + Supabase + Green API</span>
                </div>
            </div>
        </header>

        <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div class="container mx-auto flex overflow-x-auto">
                <button onclick="showTab('overview')" class="tab-btn px-6 py-4 font-semibold border-b-2 border-primary text-primary" id="btn-overview">מבט על</button>
                <button onclick="showTab('architecture')" class="tab-btn px-6 py-4 font-semibold border-b-2 border-transparent hover:text-primary" id="btn-architecture">ארכיטקטורה</button>
                <button onclick="showTab('stack')" class="tab-btn px-6 py-4 font-semibold border-b-2 border-transparent hover:text-primary" id="btn-stack">טכנולוגיות</button>
                <button onclick="showTab('database')" class="tab-btn px-6 py-4 font-semibold border-b-2 border-transparent hover:text-primary" id="btn-database">בסיס נתונים</button>
            </div>
        </nav>

        <main class="container mx-auto flex-grow p-4 md:p-8">
            
            <!-- Overview Section -->
            <section id="overview" class="tab-content active space-y-8 animate-in fade-in duration-500">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-2xl font-bold mb-4 text-secondary">מטרת הפרויקט</h2>
                    <p class="text-lg">פיתוח מערכת שידור הודעות וואטסאפ מבוססת ענן, המאפשרת גישה מכל מכשיר (מחשב/טלפון) תוך שמירה על רמת אבטחה מקסימלית והפרדה מוחלטת בין משתמשים.</p>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h3 class="text-xl font-bold mb-4">שיפור ביצועים ואבטחה</h3>
                        <div class="chart-container">
                            <canvas id="performanceChart"></canvas>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h3 class="text-xl font-bold mb-4">יתרונות המעבר ל-Next.js</h3>
                        <ul class="space-y-4">
                            <li class="flex items-start gap-3">
                                <span class="text-primary font-bold">✓</span>
                                <div>
                                    <span class="font-bold">אבטחת שרת:</span> מפתחות ה-API מוסתרים ב-Server Actions.
                                </div>
                            </li>
                            <li class="flex items-start gap-3">
                                <span class="text-primary font-bold">✓</span>
                                <div>
                                    <span class="font-bold">סנכרון מלא:</span> המפתחות שמורים ב-DB ולא בדפדפן המקומי.
                                </div>
                            </li>
                            <li class="flex items-start gap-3">
                                <span class="text-primary font-bold">✓</span>
                                <div>
                                    <span class="font-bold">זכירת משתמש:</span> ניהול Session אוטומטי דרך Supabase Auth.
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </section>

            <!-- Architecture Section -->
            <section id="architecture" class="tab-content space-y-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-2xl font-bold mb-4 text-secondary">זרימת נתונים (Information Flow)</h2>
                    <p class="mb-6">המערכת בנויה משלוש שכבות המבטיחות שמידע רגיש לעולם לא ייחשף בדפדפן המשתמש.</p>
                    
                    <div class="flex flex-col space-y-4">
                        <div class="p-4 bg-slate-50 border-r-4 border-primary rounded">
                            <h4 class="font-bold">1. צד לקוח (Client Side)</h4>
                            <p class="text-sm">ממשק משתמש רספונסיבי לניהול תגיות והזנת הודעות. מבצע קריאות ל-Server Actions.</p>
                        </div>
                        <div class="p-4 bg-slate-50 border-r-4 border-accent rounded">
                            <h4 class="font-bold">2. צד שרת (Server Actions)</h4>
                            <p class="text-sm">שליפת מפתחות ה-API מ-Supabase וביצוע השידור ל-Green API. המפתחות לא עוזבים את השרת.</p>
                        </div>
                        <div class="p-4 bg-slate-50 border-r-4 border-secondary rounded">
                            <h4 class="font-bold">3. שכבת הנתונים (Supabase)</h4>
                            <p class="text-sm">אחסון מאובטח תחת חוקי RLS המבטיחים שכל משתמש ניגש רק לנתונים שלו.</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Stack Section -->
            <section id="stack" class="tab-content space-y-8">
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="p-6 bg-white rounded-xl shadow-sm border border-slate-200 text-center">
                        <div class="text-4xl mb-2">⌨️</div>
                        <h4 class="font-bold text-lg">Cursor IDE</h4>
                        <p class="text-sm text-slate-500">סביבת פיתוח מבוססת AI לקידוד מהיר.</p>
                    </div>
                    <div class="p-6 bg-white rounded-xl shadow-sm border border-slate-200 text-center">
                        <div class="text-4xl mb-2">🚀</div>
                        <h4 class="font-bold text-lg">Next.js 15</h4>
                        <p class="text-sm text-slate-500">פריימוורק מודרני לביצועי שרת ואבטחה.</p>
                    </div>
                    <div class="p-6 bg-white rounded-xl shadow-sm border border-slate-200 text-center">
                        <div class="text-4xl mb-2">☁️</div>
                        <h4 class="font-bold text-lg">Supabase</h4>
                        <p class="text-sm text-slate-500">מסד נתונים ומערכת אימות משתמשים.</p>
                    </div>
                </div>
            </section>

            <!-- Database Section -->
            <section id="database" class="tab-content space-y-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                    <h2 class="text-2xl font-bold mb-4 text-secondary">מבנה טבלאות (SQL Schema)</h2>
                    <table class="w-full text-right border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200">
                                <th class="p-4">טבלה</th>
                                <th class="p-4">עמודות מרכזיות</th>
                                <th class="p-4">תפקיד</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="border-b border-slate-100 hover:bg-slate-50">
                                <td class="p-4 font-mono font-bold text-primary">user_settings</td>
                                <td class="p-4 text-sm">green_api_id, green_api_token, allowed_tags</td>
                                <td class="p-4 text-sm">שמירת מפתחות הגישה והגדרות אישיות.</td>
                            </tr>
                            <tr class="border-b border-slate-100 hover:bg-slate-50">
                                <td class="p-4 font-mono font-bold text-primary">audience</td>
                                <td class="p-4 text-sm">name, wa_chat_id, tags, active</td>
                                <td class="p-4 text-sm">ניהול קבוצות הוואטסאפ והנמענים לשידור.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer class="bg-slate-100 p-6 text-center text-slate-500 text-sm border-t border-slate-200">
            <p>© 2026 Broadcast Buddy - תוכנית יישום Cursor & Next.js</p>
        </footer>
    </div>

    <script>
        function showTab(tabId) {
            // Update Tab Visibility
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');

            // Update Button Styles
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'text-primary');
                btn.classList.add('border-transparent');
            });
            document.getElementById('btn-' + tabId).classList.add('border-primary', 'text-primary');
            document.getElementById('btn-' + tabId).classList.remove('border-transparent');
        }

        // Initialize Charts
        window.onload = function() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['אבטחה', 'סנכרון', 'חווית משתמש'],
                    datasets: [{
                        label: 'Vite (ישן)',
                        data: [40, 30, 60],
                        backgroundColor: '#cbd5e1',
                        borderRadius: 5
                    }, {
                        label: 'Next.js (חדש)',
                        data: [95, 98, 90],
                        backgroundColor: '#0d9488',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { callback: value => value + '%' }
                        }
                    }
                }
            });
        };
    </script>
</body>
</html>